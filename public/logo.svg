<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <!-- C3: 纯字标极简——大写字母+紫色高亮符 -->
  <!-- 紫色斜杠装饰 -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="14" height="160" rx="4" fill="#A100FF"/>
    <rect x="22" y="40" width="14" height="120" rx="4" fill="#C982FF"/>
    <rect x="44" y="70" width="14" height="90" rx="4" fill="#E8D7FF"/>
  </g>
  <!-- 字标 -->
  <text x="195" y="195" font-family="Inter, system-ui, sans-serif"
        font-weight="900" font-size="155" fill="#0F0F0F" letter-spacing="-6">aidigest</text>
  <!-- .club 用紫色高亮 -->
  <g transform="translate(810,88)">
    <rect x="0" y="0" width="280" height="120" rx="14" fill="#A100FF"/>
    <text x="20" y="93" font-family="Inter, system-ui, sans-serif"
          font-weight="800" font-size="92" fill="#FFFFFF" letter-spacing="-2">.club</text>
  </g>
  <text x="195" y="245" font-family="Inter, system-ui, sans-serif"
        font-weight="500" font-size="26" fill="#7A7A7A" letter-spacing="0.5">
    Daily AI industry digest — curated, not copy-pasted.
  </text>
</svg>

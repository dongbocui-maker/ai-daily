<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- 紧凑版 logo for Header (480x80) -->
  <!-- 紫色三条纹（节奏感） -->
  <g transform="translate(8,16)">
    <rect x="0" y="0" width="6" height="48" rx="2" fill="#A100FF"/>
    <rect x="11" y="10" width="6" height="38" rx="2" fill="#C982FF"/>
    <rect x="22" y="20" width="6" height="28" rx="2" fill="#E8D7FF"/>
  </g>
  <!-- aidigest 字标 -->
  <text x="48" y="56" font-family="Inter, system-ui, sans-serif"
        font-weight="900" font-size="44" fill="#0F0F0F" letter-spacing="-1.5">aidigest</text>
  <!-- .club 紫色色块 -->
  <g transform="translate(244,20)">
    <rect x="0" y="0" width="100" height="42" rx="6" fill="#A100FF"/>
    <text x="9" y="32" font-family="Inter, system-ui, sans-serif"
          font-weight="800" font-size="30" fill="#FFFFFF" letter-spacing="-0.5">.club</text>
  </g>
</svg>

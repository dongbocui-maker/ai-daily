name: Daily Sync from Feishu

on:
  schedule:
    # 兜底用：本地 VM cron（09:30 北京时间）失败时 GitHub 这边再补两次
    # GitHub cron 经常延迟 5–15 分钟，所以多跑几次幂等无害
    - cron: '0 4 * * *'    # UTC 04:00 = 北京 12:00（本地 cron 失败兜底）
    - cron: '0 9 * * *'    # UTC 09:00 = 北京 17:00（再次兜底）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Sync from Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DOC_TOKEN: ${{ secrets.DOC_TOKEN }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: pnpm sync

      - name: Sync GitHub Trending
        env:
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/github-trending.ts
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain src/data/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/
            git commit -m "chore(data): daily sync $(TZ=Asia/Shanghai date +%F)"
            git push
            echo "::notice::Daily content synced and pushed."
          else
            echo "::notice::No changes today."
          fi
